<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Login</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div id="login-container" class="container glass-panel">
        <header>
            <h1>Welcome Back</h1>
            <p>Login to your Expense Tracker</p>
        </header>

        <form id="login-form">
            <div class="form-control">
                <label for="username">Username</label>
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="Enter username..." required />
                </div>
            </div>
            <div class="form-control">
                <label for="password">Password</label>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter password..." required />
                </div>
            </div>
            <div id="login-error" style="display: none; color: #ef4444; margin-top: 10px; font-size: 13px; text-align: center;">Invalid username or password.</div>
            <button type="submit" class="btn">Login <i class="fa-solid fa-right-to-bracket"></i></button>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" id="forgot-pwd-link" style="color: var(--text-muted); font-size: 13px; text-decoration: none; transition: color 0.3s; ">Forgot Password?</a>
            </div>
        </form>
    </div>

    <div id="reset-container" class="container glass-panel" style="display: none;">
        <header>
            <h1>Reset Password</h1>
            <p>Set a new password for your account</p>
        </header>

        <form id="reset-form">
            <div class="form-control">
                <label for="reset-username">Confirm Username</label>
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="reset-username" placeholder="Enter username..." required />
                </div>
            </div>
            <div class="form-control">
                <label for="new-password">New Password</label>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="new-password" placeholder="Enter new password..." required />
                </div>
            </div>
            <div id="reset-error" style="display: none; color: #ef4444; margin-top: 10px; font-size: 13px; text-align: center;">Username incorrect.</div>
            <button type="submit" class="btn">Update Password <i class="fa-solid fa-floppy-disk"></i></button>
            <div style="text-align: center; margin-top: 15px;">
                <a href="#" id="back-to-login-link" style="color: var(--text-muted); font-size: 13px; text-decoration: none;">Back to Login</a>
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
