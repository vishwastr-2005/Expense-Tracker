<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Dashboard</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div id="app-container" class="container container-wide glass-panel">
        <header>
            <h1>Expense Tracker</h1>
            <p>Manage your finances with ease</p>
        </header>

        <nav class="app-nav">
            <div class="nav-group">
                <button id="nav-dashboard" class="nav-btn active"><i class="fa-solid fa-wallet"></i> Dashboard</button>
                <button id="nav-history" class="nav-btn"><i class="fa-solid fa-clock-rotate-left"></i> History & AI</button>
            </div>
            <button id="nav-logout" class="nav-btn logout-btn" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
        </nav>

        <div id="dashboard-view">
            <section class="balance-section">
                <h4>Your Balance</h4>
                <h2 id="balance">₹0.00</h2>
                
                <div class="inc-exp-container">
                    <div class="income">
                        <h4>Income</h4>
                        <p id="money-plus" class="money plus">+₹0.00</p>
                        <i class="fa-solid fa-arrow-trend-up"></i>
                    </div>
                    <div class="divider"></div>
                    <div class="expense">
                        <h4>Expense</h4>
                        <p id="money-minus" class="money minus">-₹0.00</p>
                        <i class="fa-solid fa-arrow-trend-down"></i>
                    </div>
                </div>
            </section>

            <!-- Spending Chart -->
            <div style="margin-top:20px;">
                <canvas id="expenseChart" width="400" height="200"></canvas>
            </div>

            <section class="add-transaction-section">
                <h3>Add New Transaction</h3>
                <form id="form">
                    <div class="form-control">
                        <label for="text">Description</label>
                        <div class="input-group">
                            <i class="fa-solid fa-tag"></i>
                            <input type="text" id="text" placeholder="Enter description..." required />
                        </div>
                    </div>
                    <div class="form-control">
                        <label for="amount">Amount <br /><small>(negative - expense, positive - income)</small></label>
                        <div class="input-group">
                            <i class="fa-solid fa-indian-rupee-sign"></i>
                            <input type="number" id="amount" placeholder="Enter amount..." required />
                        </div>
                    </div>
                    <div class="form-control">
                        <label for="category">Category</label>
                        <div class="input-group">
                            <i class="fa-solid fa-layer-group"></i>
                            <select id="category" style="width:100%; padding:14px 15px 14px 45px; background:rgba(0,0,0,0.2); color:var(--text-main); border:1px solid rgba(255,255,255,0.1); border-radius:12px;">
                                <option value="Food"> Food</option>
                                <option value="Salary"> Salary</option>
                                <option value="Rent"> Rent</option>
                                <option value="Transport"> Transport</option>
                                <option value="Shopping"> Shopping</option>
                                <option value="Entertainment"> Entertainment</option>
                                <option value="Utilities">Utilities</option>
                                <option value="Other"> Other</option>
                            </select>
                        </div>
                    </div>
                    <button class="btn">Add Transaction <i class="fa-solid fa-plus"></i></button>
                </form>
            </section>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
